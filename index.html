// 保存リスト(localStorage)
// ------------------------------------------------------------
const SAVED_KEY = 'sup_saved_v1';
let savedState = {
  items: (() => { try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); } catch { return []; } })(),
  modalOpen: false
};
function persistSaved() {
  try { localStorage.setItem(SAVED_KEY, JSON.stringify(savedState.items)); } catch {}
}
window.toggleSave = (kw) => {
  const idx = savedState.items.findIndex(it => it.kw === kw);
  if (idx >= 0) {
    savedState.items.splice(idx, 1);
  } else {
    const problem = PROBLEMS[state.problemId];
    if (!problem) return;
    const typeKey = problem.classify(state.answers);
    const type = problem.types[typeKey];
    const supp = type.supplements.find(s => s.kw === kw);
    if (!supp) return;
    savedState.items.push({
      kw: supp.kw,
      name: supp.name,
      dosage: supp.dosage,
      context: `${problem.title} / ${type.name}`,
      savedAt: Date.now()
    });
  }
  persistSaved();
  render();
};
window.removeSaved = (kw) => {
  savedState.items = savedState.items.filter(it => it.kw !== kw);
  persistSaved();
  render();
};
window.clearSaved = () => {
  if (confirm('保存リストを全部クリアしますか?')) {
    savedState.items = [];
    persistSaved();
    render();
  }
};
window.openAllAmazon = () => {
  savedState.items.forEach(it => window.open(amazonLink(it.kw), '_blank'));
};
window.openAllIherb = () => {
  savedState.items.forEach(it => window.open(iherbLink(it.kw), '_blank'));
};
window.openSavedModal = () => { savedState.modalOpen = true; render(); };
window.closeSavedModal = () => { savedState.modalOpen = false; render(); };

function renderSavedFab() {
  if (savedState.items.length === 0 || savedState.modalOpen) return '';
  return `
    <button class="saved-fab" onclick="openSavedModal()" type="button">
      <span>📋 保存リスト</span>
      <span class="fab-count">${savedState.items.length}</span>
    </button>
  `;
}

function renderSavedModal() {
  if (!savedState.modalOpen) return '';
  const items = savedState.items;
  if (items.length === 0) {
    return `
      <div class="modal-overlay" onclick="closeSavedModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeSavedModal()" type="button">×</button>
          <h2 class="modal-title">保存リスト</h2>
          <div class="modal-empty">まだ保存したサプリはありません。<br>診断結果ページから「+ 保存」してください。</div>
        </div>
      </div>
    `;
  }
  const list = items.map(it => `
    <div class="saved-item">
      <div class="saved-item-info">
        <div class="saved-item-name">${it.name}</div>
        <div class="saved-item-dosage">${it.dosage}</div>
        <div class="saved-item-context">${it.context}</div>
      </div>
      <div class="saved-item-actions">
        <a class="saved-item-link" href="${amazonLink(it.kw)}" target="_blank" rel="noopener">Amazon</a>
        <a class="saved-item-link secondary" href="${iherbLink(it.kw)}" target="_blank" rel="noopener">iHerb</a>
        <button class="saved-item-remove" onclick="removeSaved('${it.kw}')" type="button" title="削除">×</button>
      </div>
    </div>
  `).join('');
  return `
    <div class="modal-overlay" onclick="closeSavedModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeSavedModal()" type="button">×</button>
        <h2 class="modal-title">保存リスト (${items.length})</h2>
        <p class="modal-sub">気になるサプリを集めて、後でまとめて開けます。アフィリリンクは維持されたまま。</p>
        <div class="saved-list">${list}</div>
        <div class="modal-actions">
          <button class="modal-action primary" onclick="openAllAmazon()" type="button">Amazonで全部開く(${items.length}タブ) →</button>
          <button class="modal-action" onclick="openAllIherb()" type="button">iHerbで全部開く(${items.length}タブ) →</button>
          <button class="modal-action danger" onclick="clearSaved()" type="button">保存リストを全部クリア</button>
        </div>
      </div>
    </div>
  `;
}

function renderIntake() {
  const problem = PROBLEMS[state.problemId];
  const q = problem.questions[state.questionIndex];
  const total = problem.questions.length;
  const progressItems = problem.questions.map((_, i) => {
    if (i < state.questionIndex) return '<div class="q-progress-item done"></div>';
    if (i === state.questionIndex) return '<div class="q-progress-item current"></div>';
    return '<div class="q-progress-item"></div>';
  }).join('');
  const options = q.options.map(opt => `
    <button class="q-option" onclick="answerQuestion('${q.id}', '${opt.value}')">${opt.label}</button>
  `).join('');
  return `
    <button class="brand" onclick="goHome()" type="button">
      <span class="brand-logo">Sup<span class="dot">.</span></span>
      <span class="brand-tagline">${problem.title}</span>
    </button>
    <div class="q-progress">${progressItems}</div>
    <div class="q-step-label">QUESTION ${state.questionIndex + 1} / ${total}</div>
    <h2 class="q-text">${q.text}</h2>
    <div class="q-options">${options}</div>
    <button class="q-back" onclick="goBack()">← 戻る</button>
  `;
}

function renderResult() {
  const problem = PROBLEMS[state.problemId];
  const typeKey = problem.classify(state.answers);
  const type = problem.types[typeKey];
  const m = type.targetMetric;
  const dirIcon = m.direction === 'up' ? '↑' : m.direction === 'down' ? '↓' : '⇕';
  const dirText = m.direction === 'up' ? 'UP / 上げる' : m.direction === 'down' ? 'DOWN / 下げる' : 'STABILIZE / 安定化';
  const ingredients = type.activeIngredients.map(ing => `
    <div class="ingredient-item">
      <div class="ingredient-name">${ing.name}</div>
      <div class="ingredient-mechanism">${ing.mechanism}</div>
    </div>
  `).join('');
  const supps = type.supplements.map((s, i) => {
    const isSaved = savedState.items.some(it => it.kw === s.kw);
    return `
    <div class="supp-card${i === 0 ? ' primary' : ''}">
      ${i === 0 ? '<div class="supp-badge">FIRST PICK / 最初の一本</div>' : ''}
      <div class="supp-name">${s.name}</div>
      <div class="supp-dosage">推奨用量: ${s.dosage}</div>
      <div class="supp-reason">${s.reason}</div>
      <div class="supp-links">
        <a class="supp-link" href="${amazonLink(s.kw)}" target="_blank" rel="noopener">Amazonで探す →</a>
        <a class="supp-link secondary" href="${iherbLink(s.kw)}" target="_blank" rel="noopener">iHerbで探す →</a>
        <button class="save-btn${isSaved ? ' saved' : ''}" onclick="toggleSave('${s.kw}')" type="button">${isSaved ? '✓ 保存済み' : '+ 保存'}</button>
      </div>
    </div>
    `;
  }).join('');
  const comboKey = `${state.problemId}.${typeKey}`;
  const combination = COMBINATIONS[comboKey] || '';
  const lifestyle = type.lifestyle.map(l => `<li>${l}</li>`).join('');
  return `
    <button class="brand" onclick="goHome()" type="button">
      <span class="brand-logo">Sup<span class="dot">.</span></span>
      <span class="brand-tagline">${problem.title} / 診断結果</span>
    </button>
    <div class="result-tag">YOUR TYPE</div>
    <h1 class="result-title">${type.name}</h1>
    <div class="result-summary">${type.summary}</div>

    <div class="section-label">TARGET METRIC — コントロールすべき指標</div>
    <div class="metric-card">
      <div class="metric-header">
        <div class="metric-direction">${dirIcon}</div>
        <div>
          <div class="metric-action">${dirText}</div>
          <div class="metric-label">${m.label}</div>
        </div>
      </div>
      <div class="metric-description">${m.description}</div>
    </div>

    <div class="section-label">ACTIVE INGREDIENTS — その数値に効く成分</div>
    <div class="ingredient-list">${ingredients}</div>

    <div class="section-label">RECOMMENDED SUPPLEMENTS — これらの成分を含むサプリ</div>
    ${supps}

    ${combination ? `
    <div class="section-label">COMBINATION — 飲み合わせ・タイミング</div>
    <div class="combination-box">
      <div class="combination-text">${combination}</div>
    </div>
    ` : ''}

    <div class="section-label">LIFESTYLE INTERVENTION — 生活習慣の介入</div>
    <ul class="lifestyle-list">${lifestyle}</ul>

    <div class="disclaimer">本提案は一般的な栄養学・サプリメント研究に基づくガイドであり、医療行為や診断ではありません。特に健診数値の改善は医師の指導下で取り組むことが前提です。既往歴・服薬中・妊娠中の方は必ず医師・薬剤師にご相談ください。</div>

    <div class="action-row">
      <button class="action-btn" onclick="restart()">この悩みをもう一度やり直す</button>
      <button class="action-btn primary" onclick="goHome()">他の悩みも診る</button>
    </div>
  `;
}

function renderMobileCta() {
  if (state.screen !== 'home') return '';
  return `
    <div class="mobile-cta-bar">
      <a href="#diagnose" class="cta-btn">いま気になる悩みから診断 →</a>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  let content = '';
  if (state.screen === 'home') content = renderHome();
  else if (state.screen === 'intake') content = renderIntake();
  else if (state.screen === 'result') content = renderResult();
  app.innerHTML = content + renderSavedFab() + renderSavedModal() + renderMobileCta();
}

window.startProblem = (id) => setState({ screen: 'intake', problemId: id, questionIndex: 0, answers: {} });

window.answerQuestion = (qid, value) => {
  const newAnswers = Object.assign({}, state.answers, { [qid]: value });
  const problem = PROBLEMS[state.problemId];
  const nextIndex = state.questionIndex + 1;
  if (nextIndex >= problem.questions.length) {
    setState({ screen: 'result', answers: newAnswers });
  } else {
    setState({ questionIndex: nextIndex, answers: newAnswers });
  }
};

window.goBack = () => {
  if (state.questionIndex > 0) {
    setState({ questionIndex: state.questionIndex - 1 });
  } else {
    setState({ screen: 'home', problemId: null, questionIndex: 0, answers: {} });
  }
};

window.goHome = () => setState({ screen: 'home', problemId: null, questionIndex: 0, answers: {} });
window.restart = () => setState({ screen: 'intake', questionIndex: 0, answers: {} });

render();
</script>
</body>
</html>
